workflows:

  # ─── ANDROID APK / AAB (Google Play) ───────────────────────────────────────
  android-release:
    name: RaastKar Android Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.22.0
      java: 17
      vars:
        PACKAGE_NAME: "com.raastkar.farming"
      groups:
        - raastkar_android_signing
      android_signing:
        - raastkar_keystore

    scripts:
      - name: Set up key.properties
        script: |
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF2
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/keystore.jks
          EOF2
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/keystore.jks

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build APK (release)
        script: |
          flutter build apk --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

      - name: Build AAB (Play Store)
        script: |
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true

  # ─── iOS IPA ────────────────────────────────────────────────────────────────
  ios-release:
    name: RaastKar iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.22.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.raastkar.farming"
      groups:
        - raastkar_ios_signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.raastkar.farming

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true

  # ─── FLUTTER WEB → GoDaddy ──────────────────────────────────────────────────
  web-release:
    name: RaastKar Web Release
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: 3.22.0
      vars:
        FTP_HOST: "68.178.238.223"
        FTP_USER: "admin@raastkar.com"
        FTP_PASS: ".UV-7~tl]*QxQnv~"
        DEPLOY_PATH: "/home/v06q2yplu5ji/public_html/raastkar.com"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Flutter Web
        script: |
          flutter build web --release \
            --base-href="/" \
            --web-renderer=canvaskit

      - name: Deploy to GoDaddy via FTP
        script: |
          apt-get install -y lftp
          lftp -e "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open -u $FTP_USER,$FTP_PASS $FTP_HOST;
            mirror -R --delete --verbose build/web/ $DEPLOY_PATH/;
            quit
          "

    artifacts:
      - build/web/

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true
