workflows:

  android-release:
    name: RaastKar Android Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.24.0
      java: 17
      groups:
        - raastkar_android_signing

    scripts:
      - name: Set up keystore
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/keystore.jks
          cat > "$CM_BUILD_DIR/android/key.properties" << KEYEOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/keystore.jks
          KEYEOF

      - name: Set up local.properties
        script: |
          FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          echo "Flutter SDK: $FLUTTER_ROOT"
          cat > "$CM_BUILD_DIR/android/local.properties" << LPEOF
          flutter.sdk=$FLUTTER_ROOT
          sdk.dir=/usr/local/share/android-sdk
          flutter.compileSdkVersion=35
          flutter.minSdkVersion=21
          flutter.targetSdkVersion=35
          flutter.ndkVersion=27.0.12077973
          flutter.versionCode=$PROJECT_BUILD_NUMBER
          flutter.versionName=1.0.$PROJECT_BUILD_NUMBER
          LPEOF

      - name: Get Flutter packages
        script: flutter pub get

      - name: Patch old Flutter plugins
        script: |
          PUB_CACHE="$HOME/.pub-cache/hosted/pub.dev"
          
          # Patch geolocator_android - known path from build logs
          GEOLOCATOR="$PUB_CACHE/geolocator_android-4.6.2/android/build.gradle"
          if [ -f "$GEOLOCATOR" ]; then
            echo "Patching geolocator_android..."
            sed -i 's/flutter\.compileSdkVersion/35/g' "$GEOLOCATOR"
            sed -i 's/flutter\.minSdkVersion/21/g' "$GEOLOCATOR"
            sed -i 's/flutter\.targetSdkVersion/35/g' "$GEOLOCATOR"
            echo "Done. Line 29 now:"
            sed -n '25,35p' "$GEOLOCATOR"
          else
            echo "WARNING: geolocator not found at $GEOLOCATOR"
            find $PUB_CACHE -name "build.gradle" -path "*geolocator*" 2>/dev/null
          fi
          
          # Patch any other plugin using flutter.compileSdkVersion
          echo "Scanning all plugins for flutter.compileSdkVersion..."
          grep -rl "flutter\.compileSdkVersion" $PUB_CACHE 2>/dev/null | while read f; do
            echo "Patching: $f"
            sed -i 's/flutter\.compileSdkVersion/35/g' "$f"
            sed -i 's/flutter\.minSdkVersion/21/g' "$f"
            sed -i 's/flutter\.targetSdkVersion/35/g' "$f"
          done
          echo "Patch complete"

      - name: Build APK
        script: |
          flutter build apk --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER \
            --verbose 2>&1 | tee /tmp/build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - /tmp/build_log.txt

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: RaastKar iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.24.0
      xcode: latest
      cocoapods: default
      groups:
        - raastkar_ios_signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.raastkar.farming

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true

  web-release:
    name: RaastKar Web Release
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: 3.24.0
      vars:
        FTP_HOST: "68.178.238.223"
        FTP_USER: "admin@raastkar.com"
        FTP_PASS: ".UV-7~tl]*QxQnv~"
        DEPLOY_PATH: "/home/v06q2yplu5ji/public_html/raastkar.com"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Flutter Web
        script: |
          flutter build web --release \
            --base-href="/" \
            --web-renderer=canvaskit
      - name: Deploy to GoDaddy via FTP
        script: |
          apt-get install -y lftp
          lftp -e "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open -u $FTP_USER,$FTP_PASS $FTP_HOST;
            mirror -R --delete build/web/ $DEPLOY_PATH/;
            quit
          "

    artifacts:
      - build/web/

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true
