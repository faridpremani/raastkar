workflows:

  android-release:
    name: RaastKar Android Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.24.0
      java: 17
      groups:
        - raastkar_android_signing

    scripts:
      - name: Set up keystore
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/keystore.jks
          cat > "$CM_BUILD_DIR/android/key.properties" << KEYEOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/keystore.jks
          KEYEOF

      - name: Set up local.properties
        script: |
          FLUTTER_ROOT=$(flutter --version --machine 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('flutterRoot',''))" 2>/dev/null || echo "/Users/builder/programs/flutter")
          echo "Using Flutter at: $FLUTTER_ROOT"
          cat > "$CM_BUILD_DIR/android/local.properties" << LPEOF
          flutter.sdk=$FLUTTER_ROOT
          sdk.dir=/usr/local/share/android-sdk
          flutter.compileSdkVersion=35
          flutter.minSdkVersion=21
          flutter.targetSdkVersion=35
          flutter.ndkVersion=27.0.12077973
          flutter.versionCode=$PROJECT_BUILD_NUMBER
          flutter.versionName=1.0.$PROJECT_BUILD_NUMBER
          LPEOF
          echo "--- local.properties ---"
          cat "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER \
            --verbose 2>&1 | tee /tmp/build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - /tmp/build_log.txt

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: RaastKar iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.24.0
      xcode: latest
      cocoapods: default
      groups:
        - raastkar_ios_signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.raastkar.farming

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true

  web-release:
    name: RaastKar Web Release
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: 3.24.0
      vars:
        FTP_HOST: "68.178.238.223"
        FTP_USER: "admin@raastkar.com"
        FTP_PASS: ".UV-7~tl]*QxQnv~"
        DEPLOY_PATH: "/home/v06q2yplu5ji/public_html/raastkar.com"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Flutter Web
        script: |
          flutter build web --release \
            --base-href="/" \
            --web-renderer=canvaskit

      - name: Deploy to GoDaddy via FTP
        script: |
          apt-get install -y lftp
          lftp -e "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open -u $FTP_USER,$FTP_PASS $FTP_HOST;
            mirror -R --delete build/web/ $DEPLOY_PATH/;
            quit
          "

    artifacts:
      - build/web/

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true
