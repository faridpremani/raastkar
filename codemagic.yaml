workflows:

  android-release:
    name: RaastKar Android Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      java: 17

    scripts:
      - name: Set up keystore
        script: |
          echo "" | base64 --decode > /tmp/keystore.jks
          printf "storePassword=Raheem786!\nkeyPassword=Raheem786!\nkeyAlias=upload\nstoreFile=/tmp/keystore.jks\n" > "$CM_BUILD_DIR/android/key.properties"

      - name: Set up local.properties
        script: |
          FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          printf "flutter.sdk=%s\nsdk.dir=/usr/local/share/android-sdk\nflutter.targetSdkVersion=35\nflutter.compileSdkVersion=35\n" "$FLUTTER_ROOT" > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Patch plugins
        script: |
          PUB="$HOME/.pub-cache/hosted/pub.dev"
          for f in $(grep -rl "flutter\.compileSdkVersion\|flutter\.minSdkVersion\|flutter\.targetSdkVersion" $PUB 2>/dev/null); do
            perl -i -pe 's/flutter\.compileSdkVersion/35/g;s/flutter\.minSdkVersion/21/g;s/flutter\.targetSdkVersion/35/g' "$f"
          done

      - name: Build APK
        script: |
          flutter build apk --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: RaastKar iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up iOS signing
        script: |
          echo "" | base64 --decode > /tmp/dist.p12
          echo "" | base64 --decode > /tmp/profile.mobileprovision

          security create-keychain -p "raastkar123" raastkar-build.keychain
          security list-keychains -d user -s raastkar-build.keychain $(security list-keychains -d user | xargs)
          security default-keychain -s raastkar-build.keychain
          security unlock-keychain -p "raastkar123" raastkar-build.keychain
          security set-keychain-settings -lut 21600 raastkar-build.keychain
          security import /tmp/dist.p12 -k raastkar-build.keychain \
            -P "Raheem786!" -T /usr/bin/codesign -T /usr/bin/xcodebuild -A
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,xcodebuild: \
            -s -k "raastkar123" raastkar-build.keychain

          echo "=== Identities ==="
          security find-identity -v -p codesigning

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(python3 -c "
          import plistlib
          data = open('/tmp/profile.mobileprovision','rb').read()
          start = data.find(b'<?xml')
          end = data.find(b'</plist>') + 8
          pl = plistlib.loads(data[start:end])
          print(pl['UUID'])
          ")
          echo "Profile UUID: $UUID"
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build iOS Archive
        script: |
          # First do flutter build ios to generate the Xcode project properly
          flutter build ios --release --no-codesign \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

          # Now archive with xcodebuild
          KEYCHAIN_PATH=$(security list-keychains -d user | grep raastkar-build | tr -d ' "')
          echo "Using keychain: $KEYCHAIN_PATH"

          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=2WC4VB396D \
            CODE_SIGN_IDENTITY="Apple Distribution: Farid Premani (2WC4VB396D)" \
            PROVISIONING_PROFILE_SPECIFIER="RaastKar AppStore" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            2>&1 | tail -50

          echo "=== Archive check ==="
          ls -la /tmp/Runner.xcarchive 2>/dev/null || echo "ARCHIVE NOT FOUND"

      - name: Export IPA
        script: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>2WC4VB396D</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution: Farid Premani (2WC4VB396D)</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.raastkar.farming</key>
              <string>RaastKar AppStore</string>
            </dict>
          </dict>
          </plist>
          PLIST

          KEYCHAIN_PATH=$(security list-keychains -d user | grep raastkar-build | tr -d ' "')

          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath /tmp/ipa_output \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            2>&1 | tail -30

          mkdir -p build/ios/ipa
          find /tmp/ipa_output -name "*.ipa" -exec cp {} build/ios/ipa/ \;
          ls -la build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true

  web-release:
    name: RaastKar Web Release
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      vars:
        FTP_HOST: "68.178.238.223"
        FTP_USER: "admin@raastkar.com"
        FTP_PASS: ".UV-7~tl]*QxQnv~"
        DEPLOY_PATH: "/home/v06q2yplu5ji/public_html/raastkar.com"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Flutter Web
        script: |
          flutter build web --release \
            --base-href="/" \
            --web-renderer=canvaskit
      - name: Deploy to GoDaddy via FTP
        script: |
          find build/web -type f | while read f; do
            REMOTE_PATH=$(echo "$f" | sed 's|build/web/||')
            curl -s --ftp-create-dirs -T "$f" \
              "ftp://$FTP_HOST$DEPLOY_PATH/$REMOTE_PATH" \
              --user "$FTP_USER:$FTP_PASS" --insecure 2>/dev/null
          done
          echo "Deploy complete"

    artifacts:
      - build/web/

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true
