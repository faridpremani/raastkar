workflows:

  android-release:
    name: RaastKar Android Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      java: 17
      groups:
        - raastkar_android_signing

    scripts:
      - name: Set up keystore
        script: |
          echo "" | base64 --decode > /tmp/keystore.jks
          ls -la /tmp/keystore.jks
          keytool -list -keystore /tmp/keystore.jks -storepass "$CM_KEYSTORE_PASSWORD" -noprompt 2>&1 | head -5
          printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=/tmp/keystore.jks\n" \
            "$CM_KEYSTORE_PASSWORD" "$CM_KEY_PASSWORD" "$CM_KEY_ALIAS" \
            > "$CM_BUILD_DIR/android/key.properties"
          cat "$CM_BUILD_DIR/android/key.properties"

      - name: Set up local.properties
        script: |
          FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          printf "flutter.sdk=%s\nsdk.dir=/usr/local/share/android-sdk\n" "$FLUTTER_ROOT" \
            > "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Patch plugins
        script: |
          PUB="$HOME/.pub-cache/hosted/pub.dev"
          for f in $(grep -rl "flutter\.compileSdkVersion\|flutter\.minSdkVersion\|flutter\.targetSdkVersion" $PUB 2>/dev/null); do
            echo "Patching $f"
            perl -i -pe 's/flutter\.compileSdkVersion/35/g;s/flutter\.minSdkVersion/21/g;s/flutter\.targetSdkVersion/35/g' "$f"
          done

      - name: Build APK
        script: |
          flutter build apk --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER \
            --verbose 2>&1 | tee /tmp/build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - /tmp/build_log.txt

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: RaastKar iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: 3.27.0
      xcode: latest
      cocoapods: default
      groups:
        - raastkar_ios_signing
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.raastkar.farming

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --build-name=1.0.$PROJECT_BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true

  web-release:
    name: RaastKar Web Release
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: 3.27.0
      vars:
        FTP_HOST: "68.178.238.223"
        FTP_USER: "admin@raastkar.com"
        FTP_PASS: ".UV-7~tl]*QxQnv~"
        DEPLOY_PATH: "/home/v06q2yplu5ji/public_html/raastkar.com"

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Flutter Web
        script: |
          flutter build web --release \
            --base-href="/" \
            --web-renderer=canvaskit
      - name: Deploy to GoDaddy via FTP
        script: |
          apt-get install -y lftp
          lftp -e "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open -u $FTP_USER,$FTP_PASS $FTP_HOST;
            mirror -R --delete build/web/ $DEPLOY_PATH/;
            quit
          "

    artifacts:
      - build/web/

    publishing:
      email:
        recipients:
          - contact@ignitethespark.org
          - farid.premani@gmail.com
        notify:
          success: true
          failure: true
