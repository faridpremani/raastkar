# render.yaml — RaastKar Backend on Render.com
# Commit this file to the root of your backend repo (raastkar-backend)
# Then go to Render Dashboard → New → Blueprint → connect the repo

services:
  # ─── Node.js / Express Backend API ─────────────────────────────────────────
  - type: web
    name: raastkar-backend
    runtime: node
    plan: starter           # $7/mo — supports persistent connections
    region: singapore       # Closest to Pakistan/South Asia
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Firebase / Auth ──────────────────────────────────────────
      - key: FIREBASE_PROJECT_ID
        sync: false          # Set manually in Render dashboard (secret)
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

      # ── Stripe ──────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false          # sk_live_... — set in dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── OpenAI / AgriGPT ────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false

      # ── Weather API ─────────────────────────────────────────────
      - key: WEATHER_API_KEY
        sync: false

      # ── Database ────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: raastkar-db
          property: connectionString

  # ─── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: raastkar-db
    plan: starter            # Free tier — upgrade to $7/mo for prod
    region: singapore
    databaseName: raastkar
    user: raastkar_user
